name: NIST Compliance & NASA Power of 10 Validation

on:
  pull_request:
    branches: [ main, master ]
  push:
    branches: [ main, master ]
  schedule:
    # Run weekly on Sundays at 2 AM UTC
    - cron: '0 2 * * 0'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  nist-control-coverage:
    name: NIST SP 800-53 Rev. 5 Control Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run NIST control analysis
        run: |
          echo "=== NIST SP 800-53 Rev. 5 Control Coverage Validation ==="
          python3 scripts/analyze-nist-controls.py
          echo ""

      - name: Check control coverage
        run: |
          echo "=== Verifying 100% control coverage ==="
          FILES_NEEDING_HEADERS=$(python3 -c "import json; data=json.load(open('docs/nist-control-analysis.json')); print(data['summary']['files_needing_headers'])")
          echo "Files needing headers: $FILES_NEEDING_HEADERS"

          if [ "$FILES_NEEDING_HEADERS" -gt 0 ]; then
            echo "❌ FAIL: $FILES_NEEDING_HEADERS files with controls are missing formal NIST headers"
            echo "Run 'python3 scripts/analyze-nist-controls.py' locally to see which files need headers"
            exit 1
          else
            echo "✅ PASS: All files with NIST controls have formal headers (100% coverage)"
          fi

      - name: Upload NIST analysis artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: nist-control-analysis
          path: |
            docs/nist-control-analysis.md
            docs/nist-control-analysis.json
          retention-days: 30

  nasa-function-length:
    name: NASA Power of 10 Rule #4 (Function Length)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Validate handle_connection function length
        run: |
          echo "=== NASA Power of 10 Rule #4: Function Length Validation ==="
          echo "Rule: All functions should be ≤60 lines"
          echo ""

          # Count lines in handle_connection
          START_LINE=$(grep -n "^async fn handle_connection" crates/tacacs-server/src/server.rs | cut -d: -f1)
          if [ -z "$START_LINE" ]; then
            echo "❌ ERROR: Could not find handle_connection function"
            exit 1
          fi

          # Find the closing brace
          LINE_COUNT=0
          BRACE_COUNT=0
          FOUND_OPEN=false

          tail -n +$START_LINE crates/tacacs-server/src/server.rs | while IFS= read -r line; do
            LINE_COUNT=$((LINE_COUNT + 1))

            # Count opening braces
            OPEN=$(echo "$line" | grep -o '{' | wc -l)
            BRACE_COUNT=$((BRACE_COUNT + OPEN))

            if [ $BRACE_COUNT -gt 0 ]; then
              FOUND_OPEN=true
            fi

            # Count closing braces
            CLOSE=$(echo "$line" | grep -o '}' | wc -l)
            BRACE_COUNT=$((BRACE_COUNT - CLOSE))

            # When we return to 0 braces and we've seen the opening, we're done
            if [ "$FOUND_OPEN" = true ] && [ $BRACE_COUNT -eq 0 ]; then
              echo "handle_connection function length: $LINE_COUNT lines"

              if [ $LINE_COUNT -le 60 ]; then
                echo "✅ PASS: handle_connection is $LINE_COUNT lines (≤60 line target)"
                exit 0
              else
                echo "❌ FAIL: handle_connection is $LINE_COUNT lines (exceeds 60 line limit)"
                exit 1
              fi
            fi
          done

  runtime-unwrap-check:
    name: NASA Power of 10 Rules #5 & #7 (Error Handling)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for runtime unwrap() calls
        run: |
          echo "=== NASA Power of 10 Rules #5 & #7: Runtime unwrap() Validation ==="
          echo "Rule: No .unwrap() or .expect() in production request handling paths"
          echo ""
          echo "=== Checking critical runtime files ==="

          CRITICAL_FILES="crates/tacacs-server/src/auth.rs crates/tacacs-server/src/server.rs crates/tacacs-server/src/policy.rs"
          TOTAL_VIOLATIONS=0

          for file in $CRITICAL_FILES; do
            echo "Checking $file..."

            # Find the test module boundary
            LINE_NUM=$(grep -n "^#\[cfg(test)\]" "$file" | head -1 | cut -d: -f1)
            if [ -z "$LINE_NUM" ]; then
              LINE_NUM=9999999
            fi

            # Count unwraps before test module
            UNWRAPS=$(head -$LINE_NUM "$file" | grep -c "\.unwrap()" || echo "0")

            if [ "$UNWRAPS" -gt 0 ]; then
              echo "  ❌ Found $UNWRAPS .unwrap() calls in runtime code"
              TOTAL_VIOLATIONS=$((TOTAL_VIOLATIONS + UNWRAPS))
            else
              echo "  ✅ No .unwrap() in runtime code"
            fi
          done

          echo ""
          if [ "$TOTAL_VIOLATIONS" -gt 0 ]; then
            echo "❌ FAIL: Found $TOTAL_VIOLATIONS .unwrap() calls in critical runtime paths"
            echo "Fix by using .ok()?, .map_err()?, or proper error handling"
            exit 1
          else
            echo "✅ PASS: No .unwrap() calls in critical runtime paths"
          fi

  cargo-tests:
    name: Run All Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Run cargo test
        run: cargo test --all-features --all-targets

  cargo-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Run security audit
        run: cargo audit --deny warnings

  rustdoc-validation:
    name: Documentation & NIST Control Rendering
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build documentation
        run: cargo doc --no-deps --all-features

      - name: Verify NIST control documentation
        run: |
          echo "=== Verifying NIST control documentation renders correctly ==="
          if [ -f target/doc/usg_tacacs_server/index.html ]; then
            echo "✅ Documentation built successfully"

            # Check for NIST control references in generated docs
            if grep -q "NIST SP 800-53" target/doc/usg_tacacs_server/server/fn.handle_connection.html 2>/dev/null; then
              echo "✅ NIST controls documented in handle_connection"
            else
              echo "⚠️  Warning: NIST controls may not be rendering in documentation"
            fi
          else
            echo "❌ FAIL: Documentation build failed"
            exit 1
          fi

      - name: Upload documentation
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: rustdoc
          path: target/doc/
          retention-days: 7

  compliance-summary:
    name: Compliance Status Summary
    runs-on: ubuntu-latest
    needs: [nist-control-coverage, nasa-function-length, runtime-unwrap-check, cargo-tests]
    if: always()
    steps:
      - name: Generate compliance report
        run: |
          echo "=== NASA Power of 10 & NIST Compliance Status ==="
          echo ""
          echo "NASA Power of 10 Rules:"
          echo "  ✅ Rule #4: Functions ≤60 lines - ${{ needs.nasa-function-length.result }}"
          echo "  ✅ Rule #5 & #7: Error handling - ${{ needs.runtime-unwrap-check.result }}"
          echo "  ✅ Rule #11: Formal control markings - ${{ needs.nist-control-coverage.result }}"
          echo ""
          echo "Testing:"
          echo "  ✅ All tests passing - ${{ needs.cargo-tests.result }}"
          echo ""
          if [ "${{ needs.nist-control-coverage.result }}" = "success" ] && \
             [ "${{ needs.nasa-function-length.result }}" = "success" ] && \
             [ "${{ needs.runtime-unwrap-check.result }}" = "success" ] && \
             [ "${{ needs.cargo-tests.result }}" = "success" ]; then
            echo "🎉 FULLY COMPLIANT: All checks passed!"
          else
            echo "❌ COMPLIANCE ISSUES: Some checks failed"
            exit 1
          fi
