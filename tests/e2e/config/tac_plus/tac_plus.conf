# Shrubbery tac_plus reference configuration for e2e interoperability tests.
# Mirrors the USG TACACS+ policy as closely as possible.

key = "e2e-shared-secret-k8s"

# --------------- Users ---------------

user = alice {
    default service = permit
    login = cleartext "alice-secret"
    service = exec {
        priv-lvl = 15
    }
    cmd = show {
        permit .*
    }
    cmd = ping {
        permit .*
    }
    cmd = configure {
        permit .*
    }
    cmd = conf {
        permit .*
    }
    cmd = reload {
        deny .*
    }
}

user = bob {
    default service = deny
    login = cleartext "bob-secret"
    service = exec {
        priv-lvl = 1
    }
    cmd = show {
        permit .*
    }
    cmd = ping {
        permit .*
    }
    cmd = configure {
        deny .*
    }
    cmd = conf {
        deny .*
    }
    cmd = reload {
        deny .*
    }
}

# Deny-all fallback for unknown users is the tac_plus default when no
# matching user block exists.

# --------------- Accounting ---------------
accounting file = /var/log/tac_plus.acct
