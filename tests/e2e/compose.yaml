# SPDX-License-Identifier: Apache-2.0
# TACACS+ E2E Interoperability Lab
#
# Run with:
#   docker compose -f tests/e2e/compose.yaml up --build --abort-on-container-exit --exit-code-from test-runner
#
# This lab tests the USG TACACS+ server against Shrubbery tac_plus as a
# reference implementation.  Both servers are configured with identical
# credentials, shared secret, and (where possible) equivalent authorization
# policies.  A Python test-runner drives all 12 test scenarios and produces
# a pass/fail interoperability matrix in tests/e2e/artifacts/.

services:
  # ---------- USG TACACS+ server under test ----------
  usg-tacacs:
    build:
      context: ../..
      dockerfile: tests/e2e/Dockerfile.usg-tacacs
    command:
      - "--listen-legacy"
      - "0.0.0.0:49"
      - "--secret"
      - "e2e-shared-secret-k8s"
      - "--policy"
      - "/etc/usg-tacacs/policy.json"
      - "--schema"
      - "/etc/usg-tacacs/policy.schema.json"
      - "--allow-static-credentials"
      - "--user-password"
      - "alice:alice-secret"
      - "--user-password"
      - "bob:bob-secret"
      - "--ascii-attempt-limit"
      - "10"
      - "--ascii-lockout-limit"
      - "0"
      - "--ascii-backoff-ms"
      - "0"
      - "--log-format"
      - "json"
      - "--max-connections-per-ip"
      - "200"
      - "--packet-read-timeout-secs"
      - "10"
    volumes:
      - ./config/usg-tacacs/policy.json:/etc/usg-tacacs/policy.json:ro
      - ./config/usg-tacacs/policy.schema.json:/etc/usg-tacacs/policy.schema.json:ro
    networks:
      tacacs-e2e:
        ipv4_address: 172.30.0.10
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 49 || exit 1"]
      interval: 2s
      timeout: 5s
      retries: 30
      start_period: 10s

  # ---------- Shrubbery tac_plus reference server ----------
  tac-plus:
    image: docker.io/lfkeitel/tacacs_plus:latest
    volumes:
      - ./config/tac_plus/tac_plus.conf:/etc/tac_plus/tac_plus.conf:ro
    networks:
      tacacs-e2e:
        ipv4_address: 172.30.0.11
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo >/dev/tcp/127.0.0.1/49' 2>/dev/null || exit 1"]
      interval: 2s
      timeout: 5s
      retries: 15
      start_period: 5s

  # ---------- Test runner ----------
  test-runner:
    build:
      context: .
      dockerfile: Dockerfile.test-runner
    volumes:
      - ./scripts:/opt/e2e/scripts:ro
      - ./artifacts:/opt/e2e/artifacts
    environment:
      USG_HOST: 172.30.0.10
      USG_PORT: "49"
      TAC_HOST: 172.30.0.11
      TAC_PORT: "49"
      SHARED_SECRET: "e2e-shared-secret-k8s"
      WRONG_SECRET: "wrong-secret-value"
    depends_on:
      usg-tacacs:
        condition: service_healthy
      tac-plus:
        condition: service_healthy
    networks:
      tacacs-e2e:
        ipv4_address: 172.30.0.99

networks:
  tacacs-e2e:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/24
