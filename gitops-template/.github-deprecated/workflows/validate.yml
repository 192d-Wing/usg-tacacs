# CI/CD Validation Workflow for TACACS+ GitOps
#
# Validates all configuration changes before they reach production.
#
# NIST SP 800-53 Controls:
# - CM-3: Configuration Change Control (Automated validation gates)
# - CM-6: Configuration Settings (Schema validation)
# - SA-11: Developer Testing (Automated testing before deployment)

name: Validate Configurations

on:
  pull_request:
    paths:
      - 'locations/**'
      - 'base/**'
      - 'policies/**'
      - 'overlays/**'
  push:
    branches:
      - main
    paths:
      - 'locations/**'
      - 'base/**'
      - 'policies/**'

jobs:
  # Job 1: Validate JSON Schemas
  validate-schemas:
    name: Validate JSON Schemas
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install jsonschema pyyaml

      - name: Validate configuration schemas
        run: |
          echo "Validating config.json files..."
          python scripts/validate-config.py

      - name: Validate policy schemas
        run: |
          echo "Validating policy.json files..."
          python scripts/validate-policy.py

      - name: Validate RBAC schemas
        run: |
          echo "Validating rbac.json files..."
          python scripts/validate-rbac.py

  # Job 2: Check for Dangerous Patterns
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for unencrypted secrets
        run: |
          echo "Checking for unencrypted secrets..."
          if grep -r "BEGIN PRIVATE KEY" locations/ base/ overlays/; then
            echo "ERROR: Found unencrypted private keys!"
            exit 1
          fi

          if grep -r "password.*:" locations/*/secrets.yaml 2>/dev/null; then
            echo "ERROR: Found unencrypted secrets files!"
            exit 1
          fi

          echo "✓ No unencrypted secrets found"

      - name: Check for dangerous policy patterns
        run: |
          echo "Checking for dangerous policy patterns..."
          python scripts/check-dangerous-patterns.py

      - name: Verify SOPS encryption
        run: |
          echo "Verifying all secrets are SOPS-encrypted..."
          for file in $(find locations -name "secrets.enc.yaml"); do
            if ! grep -q "sops:" "$file"; then
              echo "ERROR: $file is not SOPS-encrypted!"
              exit 1
            fi
          done
          echo "✓ All secrets properly encrypted"

  # Job 3: Policy Compilation Test
  policy-compilation:
    name: Test Policy Compilation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build policy validation tool
        run: |
          # Use the TACACS server's policy validation
          cargo build --release --bin tacacs-policy-check 2>/dev/null || echo "Using pre-built binary"

      - name: Test all policies
        run: |
          echo "Testing policy compilation..."
          for policy in locations/*/policy.json base/policy.json; do
            echo "Testing $policy..."
            # Dry-run compilation test
            cargo run --bin tacacs-policy-check -- --policy "$policy" --check-only
          done

  # Job 4: Kustomize Validation
  kustomize-validation:
    name: Validate Kustomize Configurations
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Kustomize
        run: |
          curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
          sudo mv kustomize /usr/local/bin/

      - name: Validate base kustomization
        run: |
          kustomize build base/ > /dev/null

      - name: Validate location kustomizations
        run: |
          for location in locations/*/; do
            if [ -f "$location/kustomization.yaml" ]; then
              echo "Validating $location..."
              kustomize build "$location" > /dev/null
            fi
          done

  # Job 5: ArgoCD Validation (if ArgoCD CLI available)
  argocd-validation:
    name: Validate ArgoCD Configuration
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install ArgoCD CLI
        run: |
          curl -sSL -o /usr/local/bin/argocd https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
          chmod +x /usr/local/bin/argocd

      - name: Validate ApplicationSet
        run: |
          echo "Validating ArgoCD ApplicationSet..."
          # Basic YAML validation
          python -c "import yaml; yaml.safe_load(open('argocd/applicationset.yaml'))"
          python -c "import yaml; yaml.safe_load(open('argocd/project.yaml'))"

  # Job 6: Documentation Check
  documentation-check:
    name: Check Documentation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for README in new locations
        run: |
          for location in locations/*/; do
            if [ ! -f "$location/README.md" ]; then
              echo "WARNING: $location is missing README.md"
            fi
          done

      - name: Validate markdown links
        uses: gaurav-nelson/github-action-markdown-link-check@v1
        with:
          use-quiet-mode: 'yes'
          config-file: '.markdown-link-check.json'

  # Job 7: Generate Diff Report
  diff-report:
    name: Generate Configuration Diff
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate diff report
        run: |
          echo "## Configuration Changes" > diff-report.md
          echo "" >> diff-report.md

          # Show which locations changed
          echo "### Affected Locations:" >> diff-report.md
          git diff --name-only origin/main... | grep "^locations/" | cut -d/ -f2 | sort -u >> diff-report.md

          # Show policy changes
          echo "" >> diff-report.md
          echo "### Policy Changes:" >> diff-report.md
          git diff origin/main... -- "locations/*/policy.json" >> diff-report.md

      - name: Comment PR with diff
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const diff = fs.readFileSync('diff-report.md', 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: diff
            });

  # Final Job: All Checks Summary
  validation-summary:
    name: Validation Summary
    runs-on: ubuntu-latest
    needs: [validate-schemas, security-scan, policy-compilation, kustomize-validation, argocd-validation, documentation-check]
    if: always()
    steps:
      - name: Check results
        run: |
          if [[ "${{ needs.validate-schemas.result }}" == "success" ]] && \
             [[ "${{ needs.security-scan.result }}" == "success" ]] && \
             [[ "${{ needs.policy-compilation.result }}" == "success" ]] && \
             [[ "${{ needs.kustomize-validation.result }}" == "success" ]] && \
             [[ "${{ needs.argocd-validation.result }}" == "success" ]]; then
            echo "✅ All validations passed!"
            exit 0
          else
            echo "❌ Some validations failed"
            exit 1
          fi
